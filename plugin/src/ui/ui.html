<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Inter, system-ui, -apple-system, sans-serif;
    font-size: 12px;
    color: var(--figma-color-text, #333);
    background: var(--figma-color-bg, #fff);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: auto;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--figma-color-bg-secondary, #f5f5f5);
  }
  .status span { flex: 1; font-size: 11px; }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.connected { background: #1bc47d; }
  .dot.disconnected { background: #f24822; }
  .dot.connecting { background: #ffb020; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .log { position: absolute; left: -9999px; }
  .btn {
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--figma-color-border, #ddd);
    background: var(--figma-color-bg, #fff);
    color: var(--figma-color-text, #333);
    cursor: pointer;
  }
  .btn:hover { background: var(--figma-color-bg-secondary, #f5f5f5); }
  .resize-handle {
    position: fixed;
    top: 0;
    right: 0;
    width: 8px;
    height: 100%;
    cursor: ew-resize;
  }
</style>
</head>
<body>
  <div class="status">
    <div class="dot connecting" id="dot"></div>
    <span id="status-text">Connecting...</span>
    <button class="btn" id="copy-log">Copy Logs</button>
  </div>

  <div class="log" id="log"></div>

  <div id="resize-handle" class="resize-handle"></div>

<script>
  const WS_URL = "ws://localhost:3002";
  const RECONNECT_DELAY = 3000;

  let ws = null;
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("status-text");
  const logEl = document.getElementById("log");

  function log(text, type) {
    const entry = document.createElement("div");
    entry.className = "log-entry " + (type || "");
    const time = new Date().toLocaleTimeString();
    entry.textContent = time + "  " + text;
    logEl.appendChild(entry);
    logEl.scrollTop = logEl.scrollHeight;
    // Keep log manageable
    while (logEl.children.length > 50) {
      logEl.removeChild(logEl.firstChild);
    }
  }

  function setStatus(state, text) {
    dot.className = "dot " + state;
    statusText.textContent = text;
  }

  // ── WebSocket connection ──

  function connect() {
    setStatus("connecting", "Connecting...");
    log("[CONNECTING] " + WS_URL, "action");

    try {
      ws = new WebSocket(WS_URL);
    } catch (e) {
      setStatus("disconnected", "Failed to connect");
      log("[CONNECT_FAILED] " + e.message + " | url=" + WS_URL, "error");
      setTimeout(connect, RECONNECT_DELAY);
      return;
    }

    ws.onopen = function() {
      setStatus("connected", "Connected");
      log("[CONNECTED] " + WS_URL, "result");
    };

    ws.onmessage = function(event) {
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === "BRIDGE_REQUEST") {
          var params = msg.params ? " | params: " + JSON.stringify(msg.params).slice(0, 500) : "";
          log("[REQUEST] action=" + msg.action + " id=" + msg.id + params, "action");
          // Forward to plugin sandbox
          parent.postMessage({ pluginMessage: msg }, "*");
        } else {
          log("[WS_MSG] type=" + msg.type + " | " + JSON.stringify(msg).slice(0, 500), "action");
        }
      } catch (e) {
        log("[WS_PARSE_ERROR] " + e.message + " | raw: " + event.data.slice(0, 300), "error");
      }
    };

    ws.onclose = function(event) {
      setStatus("disconnected", "Disconnected — retrying...");
      log("[DISCONNECTED] code=" + event.code + " reason=" + (event.reason || "(none)") + " clean=" + event.wasClean, "error");
      ws = null;
      setTimeout(connect, RECONNECT_DELAY);
    };

    ws.onerror = function(event) {
      log("[WS_ERROR] WebSocket error (see browser console for details)", "error");
    };
  }

  // ── Messages from plugin sandbox ──

  window.onmessage = function(event) {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === "BRIDGE_RESPONSE") {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
        if (msg.error) {
          log("[RESPONSE_ERROR] id=" + msg.id + " | " + msg.error, "error");
        } else {
          var preview = msg.result ? JSON.stringify(msg.result).slice(0, 500) : "(empty)";
          log("[RESPONSE_OK] id=" + msg.id + " | " + preview, "result");
        }
      } else {
        var state = ws ? "readyState=" + ws.readyState : "ws=null";
        log("[SEND_FAILED] id=" + msg.id + " | WebSocket not open (" + state + ")", "error");
      }
    }

    if (msg.type === "SELECTION_CHANGED") {
      var names = (msg.nodes || []).map(function(n) { return n.name + " (" + n.type + ")"; }).join(", ");
      log("[SELECTION] page=" + msg.pageName + " | " + (names || "none"), "action");
    }
  };

  // ── Copy logs ──

  document.getElementById("copy-log").onclick = function() {
    const text = Array.from(logEl.children).map(function(el) { return el.textContent; }).join("\n");
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    var btn = document.getElementById("copy-log");
    btn.textContent = "Copied!";
    setTimeout(function() { btn.textContent = "Copy Logs"; }, 1500);
  };

  // ── Resize handle (horizontal only) ──

  (function() {
    var handle = document.getElementById("resize-handle");
    var startX, startW;
    var fixedH = 70;

    handle.onmousedown = function(e) {
      startX = e.clientX;
      startW = window.innerWidth;
      e.preventDefault();

      document.onmousemove = function(e) {
        var w = Math.max(200, startW + (e.clientX - startX));
        parent.postMessage({ pluginMessage: { type: "RESIZE", width: w, height: fixedH } }, "*");
      };

      document.onmouseup = function() {
        document.onmousemove = null;
        document.onmouseup = null;
      };
    };
  })();

  // ── Start ──
  connect();
</script>
</body>
</html>
